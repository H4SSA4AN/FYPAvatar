<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create FAQ</title>
    <link rel="stylesheet" href="createQA.css">
</head>
<body>
    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#" class="active">Create FAQ</a></li>
            <li><a href="#">Edit FAQs</a></li>
            <li><a href="#">Test FAQs</a></li>
        </ul>
        <div class="logo">InteractiveAvatar</div>
    </nav>

    <div class="container">
        <div class="left-panel">
            <h2>Create New FAQ</h2>
            <form id="createQAForm">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" placeholder="Title of the FAQ">
                </div>
                
                <div class="form-group">
                    <label>Upload FAQ CSV</label>
                    <div class="upload-container">
                        <label for="csvFile" class="upload-label" id="csvFileLabel">Upload CSV here</label>
                        <span class="remove-file" id="csvFileRemoveBtn" style="display: none;">&times;</span>
                    </div>
                    <input type="file" id="csvFile" accept=".csv" style="display: none;">
                </div>

                <div class="form-group">
                    <label for="manualEnterBtn">Manually enter FAQ</label>
                    <button type="button" id="manualEnterBtn" class="upload-label">Click here to manually enter FAQ</button>   
                </div>  

                <div class="form-group">
                    <label>Upload reference video</label>
                    <div class="upload-container">
                        <label for="mediaFile" class="upload-label" >Upload mp4 here</label>
                        <span class="remove-file" id="mediaFileRemoveBtn" style="display: none;">&times;</span>
                    </div>
                    <input type="file" id="mediaFile" accept=".mp4" style="display: none;">
                </div>

                <div class="form-group">
                    <label for="generateVideoBtn">Generate Video</label>
                    <button type="button" id="generateVideoBtn" class="upload-label">Open video generation window</button>   
                </div>  

                <div id="statusMessage" class="status-message"></div>
                
                <button type="button" class="submit-btn" onclick="createFAQ()">Create FAQ</button>
            </form>
        </div>

        <div class="right-panel">
            <h2>Preview / Instructions</h2>
            <p>Select a topic or create a new one to start adding questions to your knowledge base.</p>
            <!-- Content for right side goes here -->
        </div>

    </div>



    <script src="../../backend/pagejs/createQAjs.js"></script>
</body>
</html>
