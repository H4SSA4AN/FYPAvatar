<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload FAQ POC</title>
    <link rel="stylesheet" href="main.css">
    <script src="../backend/getCSV.js"></script>
</head>
<body>
    <div id="container">
        <div id="left-container">
            <h1>Upload FAQ CSV</h1>
            <input type="file" id="csvFile" accept=".csv">
            <input type="text" id="topicName" placeholder="Enter FAQ Topic">
            <button id="uploadButton" onclick="uploadCSV()">Upload</button>
            <p id="status"></p>

            <hr>

            <h2> Ask question </h2>
            <select id="topicSelect" onchange="fetchFAQ()">
                <option value="none">Select a topic</option>   
            </select>
            <input type="text" id="questionInput" placeholder="Ask a question">
            <button id="queryButton" onclick="queryFAQ()">Enter</button>
            <p id="answer"></p>      
        </div>

        <div id="right-container">
            <h2> FAQ </h2>
            <input type="text" id="searchInput" onkeyup="searchFAQ()" placeholder="Search FAQ">
            <div id="faq-container">
                <p> Uploaded FAQ will be displayed here </p>
            </div>
        </div>

    </div>

    



</body>
</html>
