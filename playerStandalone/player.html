<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Avatar Player (Standalone)</title>
    <link rel="stylesheet" href="player.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <!-- Upload Overlay (shown on load, hidden after zip is loaded) -->
    <div id="uploadOverlay" class="upload-overlay">
        <div class="upload-box">
            <h2>Interactive Avatar Player</h2>
            <p>Upload the project data zip to begin</p>
            <label for="zipFileInput" class="upload-label">
                <span id="uploadIcon">&#128193;</span>
                <span id="uploadText">Click to select ZIP file</span>
            </label>
            <input type="file" id="zipFileInput" accept=".zip" style="display: none;">
            <div id="uploadProgress" class="upload-progress" style="display: none;">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <span id="progressText">Loading...</span>
            </div>
        </div>
    </div>

    <!-- Player (same as current player) -->
    <div class="player-container" id="playerContainer" style="display: none;">
        
        <!-- Top-Left Controls -->
        <div class="top-left-controls">
            <div class="header">
                <h1>Interactive Avatar</h1>
                
                <div class="search-container">
                    <input type="text" id="topicSearch" placeholder="Search topics..." autocomplete="off">
                    <ul id="customDropdown" class="dropdown-list" style="display: none;"></ul>
                </div>
            </div>

            <div class="controls-wrapper">
                <button id="toggleQuestionsBtn" class="toggle-btn" style="display: none;">
                    Show Questions ▼
                </button>
                
                <div id="questionsPanel" class="questions-panel" style="display: none;">
                    <table id="faqTable">
                        <thead>
                            <tr>
                                <th>Question</th>
                                <th>Answer</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="2">Select a topic to view questions...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Portrait Avatar Video -->
        <div class="video-wrapper">
            <video id="idle-video" class="avatar-video" loop muted playsinline></video>
            <video id="active-video" class="avatar-video" muted playsinline style="opacity: 0;"></video>
        </div>

        <!-- Chat Interface -->
        <div class="chat-interface">
            <div id="chat-log" class="chat-log"></div>

            <div class="chat-wrapper">
                <div class="chat-bubble">
                    <input type="text" id="chat-input" placeholder="Type a message..." class="chat-input-field">
                </div>
                <button id="mic-button" class="mic-button" aria-label="Use microphone">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="player.js"></script>
</body>
</html>
