  <rect x="1188" y="450" width="26" height="22" rx="3" fill="#f0f0f0" stroke="#dddddd" stroke-width="1"/>
  <text x="1201" y="465" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#999999">&#10005;</text>

