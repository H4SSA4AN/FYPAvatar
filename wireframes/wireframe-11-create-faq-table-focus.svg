  <text x="444" y="468" font-family="Arial,sans-serif" font-size="12" fill="#333333">How do I register for the open day?</text>
  <text x="790" y="468" font-family="Arial,sans-serif" font-size="12" fill="#333333">Register at lboro.ac.uk/opendays</text>
