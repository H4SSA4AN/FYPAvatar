  <line x1="392" y1="542" x2="1262" y2="542" stroke="#eeeeee" stroke-width="1"/>
  <text x="410" y="520" font-family="Arial,sans-serif" font-size="12" fill="#555555">6</text>
  <text x="444" y="520" font-family="Arial,sans-serif" font-size="12" fill="#333333">Are there accommodation tours?</text>
  <text x="790" y="520" font-family="Arial,sans-serif" font-size="12" fill="#333333">Yes, guided tours run every 30 minutes.</text>
  <rect x="1156" y="502" width="26" height="22" rx="3" fill="#f0f0f0" stroke="#dddddd" stroke-width="1"/>
  <text x="1169" y="517" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#666666">&#9998;</text>
  <rect x="1188" y="502" width="26" height="22" rx="3" fill="#f0f0f0" stroke="#dddddd" stroke-width="1"/>
  <text x="1201" y="517" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#999999">&#10005;</text>

