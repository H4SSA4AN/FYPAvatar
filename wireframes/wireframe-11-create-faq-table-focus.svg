  <text x="444" y="416" font-family="Arial,sans-serif" font-size="12" fill="#333333">Can I bring my parents or guardians?</text>
  <text x="790" y="416" font-family="Arial,sans-serif" font-size="12" fill="#333333">Yes, all guests are welcome to attend.</text>
  <rect x="1156" y="398" width="26" height="22" rx="3" fill="#f0f0f0" stroke="#dddddd" stroke-width="1"/>
