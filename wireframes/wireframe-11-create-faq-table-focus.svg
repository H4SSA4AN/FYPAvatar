  <text x="444" y="364" font-family="Arial,sans-serif" font-size="12" fill="#333333">Is parking available on the day?</text>
  <text x="790" y="364" font-family="Arial,sans-serif" font-size="12" fill="#333333">Free parking available on open days.</text>
  <rect x="1156" y="346" width="26" height="22" rx="3" fill="#f0f0f0" stroke="#dddddd" stroke-width="1"/>
  <text x="1169" y="361" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#666666">&#9998;</text>
  <rect x="1188" y="346" width="26" height="22" rx="3" fill="#f0f0f0" stroke="#dddddd" stroke-width="1"/>
  <text x="1201" y="361" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#999999">&#10005;</text>

