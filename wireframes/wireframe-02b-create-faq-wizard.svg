<?xml version="1.0" encoding="UTF-8"?>
<!--
  Wireframe 02-B  –  Create FAQ (Variant B: Multi-Step Wizard)

  Key differences from the original (wireframe-02):
  • Replaces the simultaneous 3-panel layout with a guided 4-step wizard.
  • A persistent stepper bar shows exactly where the user is in the flow.
  • Step 1  – Topic Setup    : name, description, tags, generation mode
  • Step 2  – Add Q&A        : prominent drag-and-drop CSV zone + manual-add table (inline)
  • Step 3  – Avatar Config  : image generation prompt, upload own image, speech-tone preset
  • Step 4  – Review & Save  : summary of everything before committing
  • The user can jump back to any completed step by clicking its step indicator.
  • "Back" / "Next" navigation replaces the original single "Create FAQ and Generate" button.
  • Wireframe shows Step 2 (Add Q&A) as the active state so the most novel content is visible.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900">

